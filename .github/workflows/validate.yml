name: Validate plugin

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.claude-plugin/**'
      - '.mcp.json'
      - 'skills/**'
      - 'commands/**'
      - 'hooks/**'
      - '.github/workflows/validate.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse JSON manifests
        run: |
          set -euo pipefail
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .mcp.json \
            hooks/hooks.json; do
            echo "Parsing $f"
            jq empty "$f"
          done

      - name: Verify required files exist
        run: |
          set -euo pipefail
          required=(
            .claude-plugin/plugin.json
            .claude-plugin/marketplace.json
            .claude-plugin/README.md
            .mcp.json
            skills/smartify/SKILL.md
            hooks/hooks.json
            hooks/smartify-session-start.sh
            hooks/smartify-stop.sh
            hooks/smartify-precompact.sh
            commands/init.md
            commands/status.md
          )
          fail=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::required file is missing"
              fail=1
            fi
          done
          exit $fail

      - name: Verify components are NOT nested inside .claude-plugin/
        run: |
          set -euo pipefail
          fail=0
          for d in skills commands hooks; do
            if [[ -e ".claude-plugin/$d" ]]; then
              echo "::error::.claude-plugin/$d must live at the plugin root, not inside .claude-plugin/"
              fail=1
            fi
          done
          if [[ -e ".claude-plugin/.mcp.json" ]]; then
            echo "::error::.mcp.json must live at the plugin root, not inside .claude-plugin/"
            fail=1
          fi
          exit $fail

      - name: Verify marketplace source points at the plugin root
        run: |
          set -euo pipefail
          src=$(jq -r '.plugins[0].source' .claude-plugin/marketplace.json)
          if [[ "$src" != "./" ]]; then
            echo "::error file=.claude-plugin/marketplace.json::plugins[0].source must be \"./\" (repo root), got \"$src\""
            exit 1
          fi

      - name: Verify hook scripts are valid bash and executable
        run: |
          set -euo pipefail
          fail=0
          for s in hooks/*.sh; do
            echo "Checking $s"
            bash -n "$s" || { echo "::error file=$s::bash syntax error"; fail=1; }
            if [[ ! -x "$s" ]]; then
              echo "::error file=$s::hook script is not executable (chmod +x)"
              fail=1
            fi
          done
          exit $fail

      - name: Verify hooks.json declares the three memory hooks
        run: |
          set -euo pipefail
          for event in SessionStart Stop PreCompact; do
            if ! jq -e --arg e "$event" '.hooks[$e]' hooks/hooks.json >/dev/null; then
              echo "::error file=hooks/hooks.json::missing $event hook"
              exit 1
            fi
          done

      - name: Verify version sync (plugin.json vs marketplace.json)
        run: |
          set -euo pipefail
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          marketplace_version=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          echo "plugin.json version:      $plugin_version"
          echo "marketplace.json version: $marketplace_version"
          if [[ "$plugin_version" != "$marketplace_version" ]]; then
            echo "::error::version mismatch — plugin.json ($plugin_version) != marketplace.json ($marketplace_version)"
            exit 1
          fi

      - name: Verify plugin name sync
        run: |
          set -euo pipefail
          plugin_name=$(jq -r '.name' .claude-plugin/plugin.json)
          marketplace_plugin_name=$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)
          if [[ "$plugin_name" != "$marketplace_plugin_name" ]]; then
            echo "::error::plugin name mismatch — plugin.json ($plugin_name) != marketplace.json ($marketplace_plugin_name)"
            exit 1
          fi

      - name: Verify MCP server key
        run: |
          set -euo pipefail
          if ! jq -e '.mcpServers.smartify.type == "http"' .mcp.json >/dev/null; then
            echo "::error file=.mcp.json::expected mcpServers.smartify.type == \"http\""
            exit 1
          fi

      - name: Verify SKILL.md frontmatter has a name
        run: |
          set -euo pipefail
          head -n 1 skills/smartify/SKILL.md | grep -qx -- '---'
          grep -qE '^name:[[:space:]]*smartify[[:space:]]*$' skills/smartify/SKILL.md
